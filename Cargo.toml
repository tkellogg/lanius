[package]
name = "elanus"
version = "0.1.0"
edition = "2021"
description = "elanus: a minimal event-driven agent harness (inetd + cron + git hooks + sqlite + a flight recorder)"

[dependencies]
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4.6", features = ["derive"] }
croner = "3.0"
genai = "0.6.5"
libc = "0.2"
ntex = { version = "3.9.6", features = ["tokio"] }
ntex-mqtt = "8.1.0"
rumqttc = "0.24"
rusqlite = { version = "0.40", features = ["bundled"] }
sha2 = "0.10"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
toml = "1"
uuid = { version = "1", features = ["v4"] }
toml_edit = "0.25.12"
reqwest = { version = "0.13.4", features = ["json"] }
