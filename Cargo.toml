[package]
name = "elanus"
version = "0.1.0"
edition = "2021"
description = "elanus: a minimal event-driven agent harness (inetd + cron + git hooks + sqlite + a flight recorder)"

[[bin]]
name = "harness"
path = "src/main.rs"

[dependencies]
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4.6", features = ["derive"] }
croner = "3.0"
genai = "0.6.5"
globset = "0.4"
libc = "0.2"
rusqlite = { version = "0.40", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
toml = "1"
uuid = { version = "1", features = ["v4"] }
