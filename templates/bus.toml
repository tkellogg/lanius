# elanus bus — the MQTT 5 boundary interface (docs/bus.md).
#
# The listener is fan-out and ingress only: work, hooks, and the flight
# recorder never depend on it ("the black box doesn't depend on the radio").
# If it's down or disabled, external dashboards and ingress are lost —
# nothing else changes.
#
# bind: where the daemon listens. Loopback by default. Binding wider
# (e.g. "0.0.0.0:1883") is possible but DISCOURAGED until capability grants
# land: there is no authentication yet, so anyone who can reach the port can
# read every event and publish work. The daemon warns loudly if you do it.
# Running several roots on one machine? Give each its own port.
# Unix sockets are deliberately not offered — non-standard MQTT.
#
# Debugging surface: `elanus bus sub 'obs/#'` and `elanus bus pub <topic>`.
#
# trust: the one platform trust level for this whole installation
# (docs/handoffs/platform-trust.md). It is deliberately NOT per-package and
# NOT per-agent — one switch an agent must not be able to flip.
#   "full"    (default) — this is my own computer. I trust everything: an
#             agent's raw HTML in chat renders as real interface elements.
#   "reduced" — a shared or remote machine. HTML is shown as escaped text and
#             high-stakes web actions (approve, publish-as-me) need a gesture.
enabled = true
bind = "127.0.0.1:1883"
trust = "full"
