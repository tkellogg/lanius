# elanus profile — one file is the whole identity: model, skill visibility,
# throttles, sandbox policy, template vars.

# Default nouns for the topic grammar (docs/topics.md): the agent's mailbox
# is in/agent/<agent>; asks address the human as in/human/<owner>.
agent = "main"
owner = "owner"

[model]
model = "claude-sonnet-4-6"   # any genai target, e.g. "anthropic::claude-fable-5"
max_turns = 24
# Anthropic-compatible providers: force the adapter with the namespace form
# and point base_url at the provider (or set ANTHROPIC_BASE_URL in .env):
#   model = "anthropic::deepseek-chat"
#   base_url = "https://api.deepseek.com/anthropic"
#   api_key_env = "DEEPSEEK_API_KEY"   # if not ANTHROPIC_API_KEY

[skills]
include = ["#"]
exclude = []

[context]
# The harness-owned context program: seed built-ins, then visible approved
# package context stages. Other program names are reserved for future recipes.
program = "default"
# Future total assembly budget policy; current runner still enforces per-stage
# budgets. Kept here so per-agent context policy has a stable home.
max_total_ms = 30000
# Per-agent stage overrides use arrays of tables:
# [[context.stage]]
# package = "window"
# name = "window"
# enabled = false
# order = 25
# timeout_ms = 9000

[subagents]
# Generic subagent spawning is off by default. Allow specific child profiles
# here when the spawn launcher lands.
allow_profiles = []
inherit_budget = true
max_depth = 1
grant_policy = "narrow"
# context_program = "default"

[throttle."in/agent/#"]
max_concurrent = 2
llm_tokens_per_hour = 400000

[sandbox]
# The whole-agent fs grant (docs/sandbox.md). fs_write prefixes (absolute or
# root-relative) are the cage: the shell tool's whole process tree can only
# write inside them, plus the elanus root, system temp, and /dev. Empty or
# absent = no cage (camera still records obs/fs/ deltas of the root).
# fs_write = ["workspace"]
# capture_exclude = ["elanus.db", "trace.jsonl", "run/", ".env", ".git/", "target/", "node_modules/"]
# Where the shell tool runs (location, not authority — writes still flow
# through the grant + leases). Absolute, ~ expands; must exist or the tool
# call fails rather than silently falling back to the elanus root.
# workdir = "~/code/myproject"

[vars]
# {{key}} substitutions available in blocks/*.md
