# kb-llm-strengths — the first knowledge base (docs/handoffs/kb-core.md M2, D5).
# The model-tiering knowledge (which model for which role) used to live only in
# Claude's own config (.claude/skills/handoff-workflow/SKILL.md), invisible to
# elanus agents. It lives here now as a first-class, elanus-visible KB so the
# work-estimation and escalation packages — and any dispatching planner — read
# the same tiering facts.
#
# The [kb] marker (its mere presence) enrolls this package's kb/ subfolder as a
# knowledge base: `elanus kb list` names it, and the search union (kb-search)
# indexes it. No kernel data model — just plain, greppable markdown.

[kb]
title = "LLM strengths"
description = "which model for which role (planner/implementer/verifier) — preferences dominate benchmarks"
