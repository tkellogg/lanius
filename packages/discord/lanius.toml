# Discord ingress bridge — UNTESTED SCAFFOLD (no token was available when
# this was written; the structure is real, the gateway handling needs a live
# pass). Requires: DISCORD_TOKEN in the daemon's environment, python3 with
# the `websockets` package. Unconfigured, it parks (sleeps) rather than
# crash-looping the supervisor.

# Ingress publishes the canonical, recall-keyable conversation address
# `in/dm/discord/<channel-id>` (Handoff B). The `in/dm/discord/#` publish grant
# is ALSO the ingress-bridge capability the broker ACL checks (src/broker.rs
# actor_may_publish / is_dm_scoped_filter): only an owner-approved manifest can
# hold a dm-scoped grant, so a prompt-injected agent cannot forge conversation
# ingress. Egress inbox and the receipt plane are unchanged — those are correct.
[request]
subscribe = ["in/package/discord/send"]
publish   = ["in/dm/discord/#", "obs/channel/discord/#"]

[process]
mode = "daemon"
run  = "scripts/main"
session_expiry_s = 30
