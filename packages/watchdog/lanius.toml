# Measured pain. The agent self-reporting trouble is nice; a monitor that
# watches the actual event log is trustworthy — tools are the truth.

[request]
subscribe = ["in/package/watchdog/scan"]
publish   = ["in/package/watchdog/scan", "signal/pain"]

[process]
mode = "exec"
run  = "scripts/scan"
order = 0

[[cron]]
schedule = "*/5 * * * *"
emit = "in/package/watchdog/scan"
