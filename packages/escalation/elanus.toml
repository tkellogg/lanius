# The re-ping loop that makes deadline-or-default humane: an unanswered ask
# gets re-surfaced (capped) until someone answers, the deadline default
# fires, or a delivery/+/acked receipt shows a human already saw it on some
# channel. The sweep is a cron — zero resident cost.

[request]
subscribe = ["work/escalate/sweep"]
publish   = ["work/escalate/sweep", "signal/attention"]

[process]
mode = "exec"
run  = "scripts/sweep"

[[cron]]
schedule = "*/30 * * * * *"
emit = "work/escalate/sweep"
payload = { after_secs = 20 }
