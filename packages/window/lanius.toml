# window — the within-run relief valve (docs/context.md). Cross-run
# continuity is reconstruction (recent-history); THIS stage bounds a long
# tool loop inside one run: when the transcript exceeds a row budget it
# drops complete LEADING turns (permission c — never cutting between a
# tool call and its result) so a 24-turn shell marathon can't grow the
# prompt without bound. Ships pending like every stage: approve to activate.

[[stage]]
name  = "window"
run   = "scripts/stage"
order = 20
mode  = "exec"

[[stage.config]]
key = "window_rows"
type = "number"
default = 80
label = "Window rows"
help = "Maximum transcript rows kept by the within-run windowing context stage."
agent_tunable = true
