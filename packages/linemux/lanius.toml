# Local line-oriented ingress bridge: drop a *.line file into this actor's
# scratch inbox and it becomes a ledger-backed in/package/linemux/triage
# event, published once and addressed to its handler (docs/topics.md decided
# item 3: observation of arrivals comes from the delivery echo, not a second
# publish). The testable proof of the ingress pattern; packages/discord is
# the real one.

[request]
publish = ["in/package/linemux/triage"]

[process]
mode = "daemon"
run  = "scripts/main"
