# Minimal human-proxy: surface asks and algedonic signals to the human.
# Channel escalation / coalescing comes later; macOS notification is the MVP.
# One script, two subscriptions; it dispatches on the envelope's type.
# Every surfaced ask leaves an obs/channel/desktop/sent receipt (ok reflects
# whether the notification mechanism worked) — escalation reads these.

# in/human/# (not a single owner): a human's mailbox is in/human/<name>, and
# the owner's name is configurable (docs/identity.md), so surface asks for any
# human mailbox rather than pinning to the default "owner".
[request]
subscribe = ["in/human/#", "signal/#"]
publish   = ["obs/channel/desktop/sent"]

[process]
mode = "exec"
run  = "scripts/notify"
order = 10
